spring.application.name=SmartContract
server.port=8080
spring.profiles.default=mysql

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.datasource.url=jdbc:mysql://localhost:3306/smart_contract_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

spring.servlet.session.timeout=1800
spring.mvc.async.request-timeout=180000

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

logging.level.cupk.smartcontract=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

ai.qwen.enabled=true
ai.qwen.api-key=${DASHSCOPE_API_KEY:}
ai.qwen.base-url=https://ws-oyl9nh3nl21x1gd7.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
ai.qwen.model=qwen-plus
ai.qwen.timeout-seconds=120
ai.qwen.vision-model=qwen-vl-plus
ai.qwen.layout-model=qwen-plus
ai.qwen.enable-thinking=false
ai.qwen.thinking-budget=0

ai.ocr.enabled=true
ai.ocr.provider=paddle
ai.ocr.paddle-token=${PADDLE_OCR_TOKEN:}
ai.ocr.paddle-job-url=https://paddleocr.aistudio-app.com/api/v2/ocr/jobs
ai.ocr.paddle-timeout-seconds=120
ai.ocr.paddle-model=PaddleOCR-VL-1.6
ai.ocr.use-doc-orientation-classify=true
ai.ocr.use-doc-unwarping=true
ai.ocr.use-chart-recognition=true

storage.local.base-dir=../data/uploads
storage.local.bucket=local
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=210MB

signature.provider=fadada
signature.fadada-api-url=https://uat-api.fadada.com/api/v5
signature.fadada-app-id=${FADADA_APP_ID:}
signature.fadada-app-secret=${FADADA_APP_SECRET:}
signature.fadada-corp-id=${FADADA_CORP_ID:}
signature.fadada-callback-url=${FADADA_CALLBACK_URL:}

contract.threshold.major=100000
contract.threshold.super=500000

integration.oa.enabled=false
integration.oa.base-url=
integration.oa.app-key=
integration.oa.app-secret=
integration.oa.timeout-seconds=30
integration.hr.enabled=false
integration.hr.base-url=
integration.hr.app-key=
integration.hr.app-secret=
integration.hr.timeout-seconds=30
integration.electronic-signature.enabled=false
integration.electronic-signature.base-url=
integration.electronic-signature.app-key=
integration.electronic-signature.app-secret=
integration.electronic-signature.timeout-seconds=30
