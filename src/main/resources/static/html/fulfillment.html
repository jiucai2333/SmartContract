<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>履约与付款台账 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/fulfillment.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('fulfillment'));</script>

<div id="contractHeader">
    <div>
        <h2 id="contractTitle" style="margin:0;">履约与付款台账</h2>
        <p class="eyebrow" style="margin-top:4px;" id="contractEyebrow">合同编号：--</p>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <label style="font-size:13px;color:var(--muted);white-space:nowrap;">切换合同：</label>
        <select id="contractSelector" style="font-size:13px;padding:6px 12px;min-width:260px;">
            <option value="">加载中...</option>
        </select>
    </div>
</div>

<nav class="tab-nav">
    <button class="tab-btn active" data-tab="plans">履约节点</button>
    <button class="tab-btn" data-tab="deliverables">交付物清单</button>
    <button class="tab-btn" data-tab="payments">付款计划与记录</button>
</nav>

<!-- ==================== Tab 1: 履约节点 ==================== -->
<section class="tab-panel active" id="tab-plans">
    <section class="section">
        <div class="panel">
            <div class="panel-head">
                <div><p class="eyebrow">Milestones</p><h2>履约节点</h2></div>
            </div>
            <div id="planList"></div>
        </div>
    </section>
</section>

<!-- ==================== Tab 2: 交付物清单 ==================== -->
<section class="tab-panel" id="tab-deliverables">
    <section class="section">
        <div class="panel">
            <div class="panel-head">
                <div><p class="eyebrow">Deliverables</p><h2>交付物清单</h2></div>
                <button id="addDeliverableBtn">
                    <i data-lucide="plus"></i> 新增交付物
                </button>
            </div>
            <div id="deliverableList"></div>
        </div>
    </section>
</section>

<!-- ==================== Tab 3: 付款计划与记录 ==================== -->
<section class="tab-panel" id="tab-payments">

    <!-- 履约进度 -->
    <section class="section">
        <div class="overview-grid" id="progressCards" style="margin-bottom:18px;"></div>
    </section>

    <section class="section" id="overdueSection" style="display:none;">
        <div class="panel overdue-panel">
            <div class="panel-head">
                <div><p class="eyebrow">Overdue</p><h2>逾期提醒</h2></div>
            </div>
            <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">⚠ 责任归属仅作辅助提示，最终由人工确认，不自动作出法律结论。</p>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>期次</th>
                            <th>比例</th>
                            <th>金额（元）</th>
                            <th>到期日</th>
                            <th>逾期天数</th>
                            <th>违约金（元）</th>
                            <th>责任提示</th>
                            <th>已付（元）</th>
                        </tr>
                    </thead>
                    <tbody id="overdueTbody"></tbody>
                </table>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="panel">
            <div class="panel-head">
                <div><p class="eyebrow">Payment Plans</p><h2>付款计划与记录</h2></div>
                <button id="addPaymentPlanBtn">
                    <i data-lucide="plus"></i> 新增分期
                </button>
            </div>
            <div id="paymentPlanList"></div>
        </div>
    </section>
</section>

<!-- ==================== 模态框：新增/编辑交付物 ==================== -->
<div id="deliverableModal" class="modal" hidden>
    <div class="modal-card">
        <div class="modal-head">
            <h3 id="deliverableModalTitle">新增交付物</h3>
            <button type="button" id="closeDeliverableModal" class="secondary">关闭</button>
        </div>
        <div class="form-grid">
            <label>选择合同
                <select id="delivContractId">
                    <option value="">请选择合同</option>
                </select>
                <span id="delivContractLabel" style="display:none;font-weight:600;color:var(--ink);"></span>
            </label>
            <label>履约节点
                <select id="delivPlanSelect">
                    <option value="">请先选择合同</option>
                </select>
            </label>
            <label>交付物名称
                <input id="delivName" placeholder="请输入交付物名称">
            </label>
            <label>交付物类型
                <select id="delivType">
                    <option value="">请选择类型</option>
                    <option value="DESIGN_DOC">需求设计文档</option>
                    <option value="SOURCE_CODE">源代码</option>
                    <option value="RUNNABLE_PROGRAM">可运行程序</option>
                    <option value="ACCEPTANCE_REPORT">验收报告</option>
                </select>
            </label>
            <label>合同阶段
                <select id="delivStage">
                    <option value="">请选择阶段</option>
                    <option value="SIGNING">签订阶段</option>
                    <option value="MID_DELIVERY">中期交付</option>
                    <option value="ACCEPTANCE">验收阶段</option>
                </select>
            </label>
            <label>排序号
                <input id="delivSort" type="number" min="0" value="0" placeholder="序号">
            </label>
        </div>
        <input type="hidden" id="delivId">
        <input type="hidden" id="delivPlanId">
        <div class="button-row">
            <button id="saveDeliverableBtn">保存</button>
            <button id="cancelDeliverableBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 模态框：确认交付物 ==================== -->
<div id="confirmModal" class="modal" hidden>
    <div class="modal-card modal-sm">
        <div class="modal-head">
            <h3>确认交付物</h3>
            <button type="button" id="closeConfirmModal" class="secondary">关闭</button>
        </div>
        <p id="confirmDelivName" style="margin-bottom:16px;"></p>
        <label>确认人（选填）
            <input id="confirmBy" placeholder="请输入确认人姓名">
        </label>
        <div class="button-row">
            <button id="confirmDeliverableBtn">确认交付</button>
            <button id="cancelConfirmBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 模态框：新增/编辑分期付款 ==================== -->
<div id="paymentPlanModal" class="modal" hidden>
    <div class="modal-card">
        <div class="modal-head">
            <h3 id="paymentPlanModalTitle">新增分期</h3>
            <button type="button" id="closePaymentPlanModal" class="secondary">关闭</button>
        </div>
        <div class="form-grid">
            <label>选择合同
                <select id="ppContractId">
                    <option value="">请选择合同</option>
                </select>
                <span id="ppContractLabel" style="display:none;font-weight:600;color:var(--ink);"></span>
            </label>
            <label>履约节点
                <select id="ppPlanSelect">
                    <option value="">请先选择合同</option>
                </select>
            </label>
            <label>第几期
                <input id="ppInstallment" type="number" min="1" placeholder="例如：1">
            </label>
            <label>比例（0.00 ~ 1.00）
                <input id="ppRatio" type="number" min="0" max="1" step="0.01" placeholder="例如：0.30">
            </label>
            <label>金额（元）
                <input id="ppAmount" type="number" min="0" step="0.01" placeholder="自动计算或手动输入">
            </label>
            <label>到期日
                <input id="ppDueDate" type="date">
            </label>
            <label>日违约金率
                <input id="ppPenaltyRate" type="number" min="0" max="1" step="0.0001" value="0.0005" placeholder="默认 0.0005 (0.05%/天)">
            </label>
            <label class="wide">前置交付物（可选）
                <select id="ppPrerequisite">
                    <option value="">无前置条件</option>
                </select>
            </label>
        </div>
        <input type="hidden" id="ppId">
        <input type="hidden" id="ppPlanId">
        <div class="button-row">
            <button id="savePaymentPlanBtn">保存</button>
            <button id="cancelPaymentPlanBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 模态框：确认到账 ==================== -->
<div id="recordPaymentModal" class="modal" hidden>
    <div class="modal-card">
        <div class="modal-head">
            <h3>确认到账</h3>
            <button type="button" id="closeRecordPaymentModal" class="secondary">关闭</button>
        </div>
        <p id="recordPaymentPlanInfo" style="margin-bottom:16px;color:var(--muted);"></p>
        <div class="form-grid">
            <label>实付金额（元）
                <input id="rpAmount" type="number" min="0.01" step="0.01" placeholder="请输入金额">
            </label>
            <label>付款时间
                <input id="rpPaidAt" type="datetime-local">
            </label>
            <label>凭证号
                <input id="rpReceiptNo" placeholder="请输入凭证号">
            </label>
            <label class="wide">备注
                <textarea id="rpNotes" rows="2" placeholder="备注信息（选填）"></textarea>
            </label>
        </div>
        <input type="hidden" id="rpPaymentPlanId">
        <div class="button-row">
            <button id="saveRecordPaymentBtn">确认到账</button>
            <button id="cancelRecordPaymentBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<!-- ==================== 通用确认删除对话框 ==================== -->
<div id="deleteConfirmModal" class="modal" hidden>
    <div class="modal-card modal-sm">
        <div class="modal-head">
            <h3>确认删除</h3>
            <button type="button" id="closeDeleteModal" class="secondary">关闭</button>
        </div>
        <p id="deleteMsg" style="margin-bottom:16px;">确定要删除吗？此操作不可恢复。</p>
        <div class="button-row">
            <button id="confirmDeleteBtn" class="danger">确认删除</button>
            <button id="cancelDeleteBtn" class="secondary">取消</button>
        </div>
    </div>
</div>

<script>document.write(closeAppShell());</script>
<script src="../js/fulfillment.js"></script>
</body>
</html>
