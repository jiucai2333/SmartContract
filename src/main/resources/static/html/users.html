<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>用户管理 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/users.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('users'));</script>
<section class="section">
    <div class="panel">
        <div class="panel-head">
            <div><p class="eyebrow">RBAC Admin</p><h2>用户与权限管理</h2></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>用户ID</th>
                        <th>用户名</th>
                        <th>当前角色</th>
                        <th>部门</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="userTbody"></tbody>
            </table>
        </div>
    </div>
</section>

<div id="roleModal" class="modal" hidden>
    <div class="modal-card">
        <div class="modal-head">
            <h3 id="roleModalTitle">编辑角色</h3>
            <button type="button" id="closeRoleModal" class="secondary">关闭</button>
        </div>
        <div id="roleSelectContainer"></div>
        <div class="button-row">
            <button id="saveRoleBtn">保存</button>
        </div>
    </div>
</div>
<script>document.write(closeAppShell());</script>
<script src="../js/users.js"></script>
</body>
</html>
