<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
<div class="auth-card">
    <div class="brand auth-brand">
        <span class="brand-mark">合</span>
        <div><strong>智能合同管理</strong></div>
    </div>
    <h1>登录</h1>
    <p class="auth-subtitle">使用账号登录后进入工作台</p>
    <form id="loginForm" class="auth-form" action="javascript:void(0)">
        <label>用户名<input name="username" value="admin" required autocomplete="username"></label>
        <label>密码<input name="password" type="password" value="Admin@123" required autocomplete="current-password"></label>
        <button type="button" id="loginBtn">登录</button>
    </form>
    <p class="auth-footer">还没有账号？<a href="/html/register.html">立即注册</a></p>
    <p class="auth-hint">演示账号密码均为 Demo@123（admin / legal / user / dept_leader / finance / executive）</p>
</div>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>
