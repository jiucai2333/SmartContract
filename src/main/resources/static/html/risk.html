<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>风险审查 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/risk.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('risk'));</script>
<section class="section">
    <div class="panel" id="reviewInputPanel">
        <div class="panel-head"><div><p class="eyebrow">Contract Input</p><h2>提交合同文本</h2></div></div>
        <div class="form-grid">
            <label>合同类型
                <select id="contractType">
                    <option value="">请选择</option>
                    <option value="采购合同">采购合同</option>
                    <option value="销售合同">销售合同</option>
                    <option value="服务合同">服务合同</option>
                    <option value="技术开发合同">技术开发合同</option>
                    <option value="租赁合同">租赁合同</option>
                    <option value="劳动合同">劳动合同</option>
                    <option value="合作协议">合作协议</option>
                </select>
            </label>
            <label>业务范围
                <input id="businessScope" type="text" placeholder="如：IT基础设施运维服务">
            </label>
            <label>甲方名称
                <input id="partyA" type="text" placeholder="甲方公司全称">
            </label>
            <label>乙方名称
                <input id="partyB" type="text" placeholder="乙方公司全称">
            </label>
            <label class="wide">特殊条款
                <input id="specialTerms" type="text" placeholder="如：分三期付款、含保密附件">
            </label>
            <label class="wide">合同正文
                <textarea id="contractText" rows="10" placeholder="请粘贴合同全文，AI 将自动进行风险审查"></textarea>
            </label>
        </div>
        <div class="button-row">
            <button id="reviewBtn" type="button">AI 风险审查</button>
            <button id="clearBtn" type="button" class="secondary">清空</button>
        </div>
    </div>
</section>
<section class="section report-layout">
    <div class="panel">
        <div class="panel-head"><div><p class="eyebrow">Saved Report</p><h2>本次风险报告</h2></div></div>
        <div id="reportSummary" class="report-summary empty">完成 AI 审核后，报告会自动存库并显示在这里。</div>
    </div>
    <div class="panel">
        <div class="panel-head"><div><p class="eyebrow">History</p><h2>历史风险报告</h2></div></div>
        <div id="reportList" class="report-list">
            <div class="list-item"><span>暂无风险报告</span></div>
        </div>
    </div>
</section>
<section class="section review-layout">
    <div class="panel contract-preview">
        <div class="panel-head"><div><p class="eyebrow">Review Split View</p><h2>合同正文预览</h2></div></div>
        <article id="contractBody">
            <p class="hint">提交合同文本或打开历史报告后，这里会展示合同条款。点击右侧风险卡片可定位到对应条款。</p>
        </article>
    </div>
    <div class="panel">
        <div class="panel-head"><div><p class="eyebrow">Risk Audit</p><h2>风险项明细</h2></div></div>
        <div id="riskList" class="list">
            <div class="list-item"><span>请提交合同文本，AI 将进行风险审查。</span></div>
        </div>
    </div>
</section>
<script>document.write(closeAppShell());</script>
<script src="../js/risk.js"></script>
</body>
</html>
