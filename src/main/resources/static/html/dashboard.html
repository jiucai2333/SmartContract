<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>工作台 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('dashboard'));</script>
<section class="section">
    <div class="role-panels">
        <div class="role-panel" data-role-panel="USER">我的草稿、到期事项和快捷发起入口</div>
        <div class="role-panel" data-role-panel="DEPT_LEADER">本部门合同概览、待审批事项、部门统计报表</div>
        <div class="role-panel" data-role-panel="LEGAL">全公司合同风险概览、重大合同会签待办、法规遵从</div>
        <div class="role-panel" data-role-panel="FINANCE">付款节点总览、交付物核验清单、金额元数据导出</div>
        <div class="role-panel" data-role-panel="EXECUTIVE">全公司合同摘要总览、超阈值合同预警、批量委托审批</div>
    </div>
    <div class="metric-grid">
        <a class="metric" href="ledger.html"><i data-lucide="file-text"></i><span>合同总数</span><strong id="totalContracts" class="skeleton skeleton-pulse" aria-live="polite"></strong><small>台账与归档统计</small><div class="metric-trend" id="trendTotal"></div><span class="metric-go">查看台账 →</span></a>
        <a class="metric accent" href="approval.html"><i data-lucide="clock"></i><span>待办审批</span><strong id="approvingContracts" class="skeleton skeleton-pulse" aria-live="polite"></strong><small>流程超时自动催办</small><div class="metric-trend" id="trendApproving"></div><span class="metric-go">前往审批 →</span></a>
        <a class="metric danger" href="risk.html"><i data-lucide="shield-alert"></i><span>高风险</span><strong id="highRiskContracts" class="skeleton skeleton-pulse" aria-live="polite"></strong><small>未复核禁止提交</small><div class="metric-trend" id="trendRisk"></div><span class="metric-go">风险审查 →</span></a>
        <a class="metric warn" href="fulfillment.html"><i data-lucide="refresh-cw"></i><span>30天内预警</span><strong id="dueSoonPlans" class="skeleton skeleton-pulse" aria-live="polite"></strong><small>30/7/1 天三级提醒</small><div class="metric-trend" id="trendDue"></div><span class="metric-go">履约预警 →</span></a>
    </div>
    <div class="dashboard-body">
        <div class="dash-left">
            <div class="panel chart-panel">
                <div class="panel-head"><div><h2>合同趋势图</h2></div></div>
                <div class="bar-chart" id="monthlyTrendChart"><div class="chart-loading"><span class="loading-spinner"></span></div></div>
            </div>
            <div class="charts-row">
                <div class="panel chart-panel">
                    <div class="panel-head"><div><h2>合同类型分布</h2></div></div>
                    <div class="hbar-chart" id="typeDistChart"><div class="chart-loading"><span class="loading-spinner"></span></div></div>
                </div>
                <div class="panel chart-panel">
                    <div class="panel-head"><div><h2>合同状态分布</h2></div></div>
                    <div class="donut-chart-wrap" id="statusDistChart"><div class="chart-loading"><span class="loading-spinner"></span></div></div>
                </div>
            </div>
        </div>
        <div class="dash-right">
            <div class="panel warn-panel">
                <div class="panel-head"><div><h2>到期预警</h2></div></div>
                <div class="warn-list" id="expiryWarnings"></div>
            </div>
            <div class="panel task-panel">
                <div class="panel-head"><div><h2>待办任务</h2></div></div>
                <div class="task-list" id="pendingTasks"></div>
            </div>
        </div>
    </div>
</section>
<script>document.write(closeAppShell());</script>
<script src="../js/dashboard.js"></script>
</body>
</html>
