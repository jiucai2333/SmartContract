<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>工作台 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('dashboard'));</script>
<section class="section">
    <div class="role-panels">
        <div class="role-panel" data-role-panel="USER">我的草稿、到期事项和快捷发起入口</div>
        <div class="role-panel" data-role-panel="DEPT_LEADER">本部门合同概览、待审批事项、部门统计报表</div>
        <div class="role-panel" data-role-panel="LEGAL">全公司合同风险概览、重大合同会签待办、法规遵从</div>
        <div class="role-panel" data-role-panel="FINANCE">付款节点总览、交付物核验清单、金额元数据导出</div>
        <div class="role-panel" data-role-panel="EXECUTIVE">全公司合同摘要总览、超阈值合同预警、批量委托审批</div>
        <div class="role-panel" data-role-panel="ADMIN">系统配置、RBAC 权限管理、审计日志与数据备份</div>
    </div>
    <div class="metric-grid">
        <article class="metric"><i data-lucide="file-text"></i><span>合同总数</span><strong id="totalContracts">0</strong><small>台账与归档统计</small></article>
        <article class="metric accent"><i data-lucide="clock"></i><span>待办审批</span><strong id="approvingContracts">0</strong><small>流程超时自动催办</small></article>
        <article class="metric danger"><i data-lucide="shield-alert"></i><span>高风险</span><strong id="highRiskContracts">0</strong><small>未复核禁止提交</small></article>
        <article class="metric warn"><i data-lucide="refresh-cw"></i><span>30天内预警</span><strong id="dueSoonPlans">0</strong><small>30/7/1 天三级提醒</small></article>
    </div>
    <div class="quick-links panel">
        <div class="panel-head"><div><p class="eyebrow">Quick Access</p><h2>快捷入口</h2></div></div>
        <div class="quick-grid">
            <a class="quick-card" href="draft.html"><i data-lucide="edit-3"></i><span>合同编制</span><small>起草新合同</small></a>
            <a class="quick-card" href="ledger.html"><i data-lucide="search"></i><span>合同台账</span><small>查看管理合同</small></a>
            <a class="quick-card" href="approval.html"><i data-lucide="circle-check"></i><span>审批中心</span><small>流程审批追踪</small></a>
            <a class="quick-card" href="risk.html"><i data-lucide="shield-alert"></i><span>风险审查</span><small>AI 智能风控</small></a>
        </div>
    </div>
</section>
<script>document.write(closeAppShell());</script>
<script src="../js/dashboard.js"></script>
</body>
</html>
