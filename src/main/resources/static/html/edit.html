<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线编辑 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/edit.css">
</head>
<body>
<script src="../js/common.js"></script>
<script>document.write(appShellHtml('edit'));</script>
<section class="section split">
    <div class="panel">
        <div id="contractMetaPanel" class="field-panel">
            <div class="field-list">
                <label class="field-item"><span>合同名称</span><input id="contractTitle" placeholder="请输入合同名称"></label>
                <label class="field-item"><span>合同相对方</span><input id="contractCounterparty" placeholder="请输入合同相对方"></label>
                <label class="field-item"><span>合同类型</span>
                    <select id="contractType">
                        <option value="PURCHASE">采购合同</option><option value="SALES">销售合同</option>
                        <option value="TECH">技术合同</option><option value="LABOR">劳务合同</option>
                        <option value="LEASE">租赁合同</option><option value="OTHER">其他</option>
                    </select>
                </label>
                <label class="field-item"><span>合同金额</span><input id="contractAmount" type="number" min="0" step="0.01" placeholder="请输入合同金额"></label>
            </div>
        </div>
        <p class="hint">上传合同模板，系统会提取正文。识别完成后可在右侧直接校对和编辑。</p>
        <div class="draft-steps" aria-label="合同模板处理进度">
            <div class="draft-step active" data-step="1"><span>1</span>上传模板</div>
            <div class="draft-step" data-step="2"><span>2</span>OCR 识别</div>
            <div class="draft-step" data-step="3"><span>3</span>正文校对</div>
        </div>
        <label class="upload-zone" id="uploadZone">拖拽 Word 或 PDF 合同模板到此处
            <input id="fileInput" type="file" accept=".pdf,.docx" hidden>
            <div class="upload-actions">
                <button type="button" id="pickFileBtn" class="secondary">上传合同材料 / 模板文件</button>
                <span id="uploadFileName" class="upload-name">未选择文件</span>
            </div>
        </label>
        <div id="ocrPanel" class="ocr-panel" hidden>
            <div class="ocr-head">
                <strong id="ocrStatusText">OCR 状态</strong>
                <button type="button" id="retryOcrBtn" class="secondary" hidden>重新识别</button>
            </div>
            <p id="ocrHint" class="ocr-hint">正在等待识别结果。</p>
        </div>
        <div class="hint" id="draftStatus">尚未创建草稿</div>
    </div>
    <div class="panel result-panel">
        <div class="result-actions">
            <button id="downloadDraftBtn" type="button" class="secondary">下载 Word</button>
            <button id="saveDraftBtn" type="button">保存草稿</button>
        </div>
        <div class="editor-toolbar">
            <span class="hint">合同正文校对</span>
            <span class="toolbar-btns">
                <button type="button" data-cmd="bold" title="加粗"><b>B</b></button>
                <button type="button" data-cmd="italic" title="斜体"><i>I</i></button>
                <button type="button" data-cmd="insertUnorderedList" title="无序列表">⋮</button>
                <button type="button" data-cmd="undo" title="撤销">↩</button>
                <button type="button" data-cmd="redo" title="重做">↪</button>
            </span>
            <span id="draftCharCount" class="ocr-char-count"></span>
        </div>
        <div id="draftEditor" class="rich-editor" contenteditable="true" spellcheck="true"></div>
    </div>
</section>
<script>document.write(closeAppShell());</script>
<script src="../js/edit.js"></script>
</body>
</html>
