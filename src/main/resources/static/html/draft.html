<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>合同草稿 - 智能合同管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/draft.css">
</head>

<body>
<script src="../js/common.js"></script>
<script>
    document.write(appShellHtml('draft'));
</script>

<div class="section draft-filter-row">
    <section class="panel draft-filter-panel">
        <div class="filters">
            <div class="search-field">
                <i data-lucide="search"></i>
                <input id="draftKeyword" placeholder="按合同编号、标题、相对方搜索">
            </div>

            <select id="draftType">
                <option value="">全部类型</option>
                <option value="PURCHASE">采购合同</option>
                <option value="SALES">销售合同</option>
                <option value="TECH">技术合同</option>
                <option value="LABOR">劳务合同</option>
                <option value="LEASE">租赁合同</option>
                <option value="OTHER">其他</option>
            </select>

            <button id="draftResetBtn" class="secondary">
                <i data-lucide="refresh-cw"></i>
                重置
            </button>
        </div>
    </section>

    <a class="primary-link page-action-btn" href="/html/edit.html">
        <i data-lucide="plus"></i>
        新建编制
    </a>
</div>

<section class="section panel draft-table-panel">
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>合同编号</th>
                <th>合同名称</th>
                <th>合同相对方</th>
                <th>合同类型</th>
                <th>合同金额</th>
                <th>状态</th>
                <th>最近保存</th>
                <th>负责人</th>
                <th>操作</th>
            </tr>
            </thead>

            <tbody id="draftRows"></tbody>
        </table>
    </div>
</section>

<script>
    document.write(closeAppShell());
</script>
<script src="../js/draft.js"></script>
</body>
</html>
