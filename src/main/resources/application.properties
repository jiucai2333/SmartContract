spring.application.name=SmartContract
server.port=8080
spring.profiles.default=mysql

spring.datasource.url=jdbc:mysql://localhost:3306/smart_contract_db?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=z123

# ========== Jackson ==========
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# ========== Session ==========
spring.servlet.session.timeout=1800

