<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feature F Security Audit</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            background: #f6f7fb;
            color: #1f2937;
        }
        body {
            margin: 0;
        }
        .shell {
            display: grid;
            grid-template-columns: 240px minmax(0, 1fr);
            min-height: 100vh;
        }
        aside {
            background: #111827;
            color: #fff;
            padding: 24px 16px;
        }
        .brand {
            font-weight: 700;
            margin-bottom: 24px;
        }
        nav a {
            display: block;
            color: #d1d5db;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 4px;
        }
        nav a:hover {
            background: #1f2937;
            color: #fff;
        }
        main {
            padding: 24px;
        }
        section {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, select, textarea, button {
            min-height: 36px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            padding: 0 10px;
        }
        textarea {
            width: min(100%, 920px);
            min-height: 120px;
            padding: 10px;
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }
        button {
            background: #2563eb;
            border-color: #2563eb;
            color: #fff;
            cursor: pointer;
        }
        button.secondary {
            background: #fff;
            color: #1f2937;
            border-color: #cbd5e1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            vertical-align: top;
        }
        code {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        @media (max-width: 760px) {
            .shell {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="shell">
    <aside>
        <div class="brand">Feature F</div>
        <nav id="mainNav"></nav>
    </aside>
    <main>
        <section>
            <h1>Security Console</h1>
            <div class="row">
                <input id="username" value="admin" aria-label="Username">
                <input id="password" value="Admin@123" type="password" aria-label="Password">
                <button id="loginBtn">Login</button>
                <button id="logoutBtn" class="secondary">Logout</button>
                <span id="userChip"></span>
            </div>
        </section>

        <section>
            <h2>Security Audit Event</h2>
            <div class="row">
                <select id="eventType" aria-label="Security event type">
                    <option value="CONTRACT_CREATE_OR_UPDATE">Contract create/update</option>
                    <option value="VERSION_RESTORE">Version restore</option>
                    <option value="AI_REVIEW">AI review</option>
                    <option value="APPROVAL_ACTION">Approval action</option>
                    <option value="SIGN_FILE_UPLOAD">Signing file upload</option>
                    <option value="ARCHIVE">Archive</option>
                    <option value="DELIVERY_PAYMENT_CHANGE">Delivery/payment change</option>
                </select>
                <input id="targetType" value="CONTRACT" aria-label="Target type">
                <input id="targetId" value="C-2026-001" aria-label="Target id">
                <input id="eventSummary" value="Audit coverage sample" aria-label="Event summary">
                <input id="eventPayload" value="phone=13812345678, idCard=110101199001011234, bank=6222020202020202020" aria-label="Event payload">
                <button id="recordSecurityEventBtn">Record</button>
            </div>
        </section>

        <section>
            <h2>AI Risk Review</h2>
            <textarea id="contractText" aria-label="Contract text">Party A contact: 13812345678, ID: 110101199001011234, email: alice@example.com, bank account: 6222020202020202020. The supplier shall deliver within 30 days.</textarea>
            <div class="row">
                <button id="riskReviewBtn">Review</button>
                <button id="exportReviewBtn" class="secondary">Export Text</button>
            </div>
            <pre><code id="riskReviewOutput"></code></pre>
        </section>

        <section>
            <h2>Audit Logs</h2>
            <button id="loadAuditBtn" class="secondary">Refresh</button>
            <table>
                <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Operation</th>
                    <th>Result</th>
                    <th>Detail</th>
                </tr>
                </thead>
                <tbody id="auditTbody"></tbody>
            </table>
        </section>
    </main>
</div>
<script src="/js/security-menu.js"></script>
</body>
</html>
